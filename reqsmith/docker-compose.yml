services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reqsmith
      POSTGRES_PASSWORD: reqsmith
      POSTGRES_DB: reqsmith
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reqsmith"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://reqsmith:reqsmith@postgres:5432/reqsmith
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  pgdata:
