name: reqsmith CI

on:
  push:
    paths:
      - "reqsmith/**"
      - ".github/workflows/reqsmith-ci.yml"
  pull_request:
    paths:
      - "reqsmith/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reqsmith
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests alembic
      - name: Test
        run: pytest -q
